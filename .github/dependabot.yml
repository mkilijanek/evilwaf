version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Warsaw"
    allow:
      - dependency-type: "all"
    commit-message:
      prefix: "deps(pip)"
      include: "scope"
    groups:
      python-runtime:
        patterns:
          - "requests"
          - "urllib3"
          - "httpx"
          - "cryptography"
          - "pyOpenSSL"
      python-protocols:
        patterns:
          - "h2"
          - "hpack"
          - "hyperframe"
          - "aioquic"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:15"
      timezone: "Europe/Warsaw"
    commit-message:
      prefix: "deps(docker)"
      include: "scope"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "Europe/Warsaw"
    commit-message:
      prefix: "deps(actions)"
      include: "scope"
    groups:
      gh-actions:
        patterns:
          - "actions/*"
          - "docker/*"
          - "github/*"
          - "aquasecurity/*"
          - "anchore/*"
          - "sigstore/*"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
